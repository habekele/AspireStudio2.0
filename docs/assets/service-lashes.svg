<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1125">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAF7F2"/>
      <stop offset="1" stop-color="#F2E8D9"/>
    </linearGradient>
  </defs>
  <rect width="900" height="1125" fill="url(#bg)"/>

  <!-- arch backdrop -->
  <path d="M190 900 L190 480 A260 260 0 0 1 710 480 L710 900 Z" fill="#F0E6D3"/>
  <path d="M160 935 L160 480 A290 290 0 0 1 740 480 L740 935" fill="none" stroke="#C4956A" stroke-opacity="0.4" stroke-width="3"/>

  <!-- brow -->
